<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Leksikon</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Leksikon">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="description" content="Быстрый и безопасный мессенджер">
</head>
<body>
    <div id="app">
        <div id="authScreen" class="auth-container">
            <div class="auth-card">
                <h1>📱 Leksikon</h1>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Вход</button>
                    <button class="tab-btn" data-tab="register">Регистрация</button>
                </div>
                <form id="loginForm" class="auth-form active">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <button type="button" id="loginWithCodeBtn" class="tab-btn active" style="flex:1;">По коду</button>
                        <button type="button" id="loginWithPasswordBtn" class="tab-btn" style="flex:1;">По паролю</button>
                    </div>
                    <div id="loginCodeDiv">
                        <button type="button" id="sendLoginCodeBtn">Отправить код</button>
                        <input type="text" id="loginCode" placeholder="Код из письма" style="margin-top: 10px;">
                    </div>
                    <div id="loginPasswordDiv" style="display: none;">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                    </div>
                    <button type="submit" id="loginSubmitBtn">Войти</button>
                    <button type="button" id="appleLoginBtn" style="background: #000; margin-top: 10px;">🍎 Войти через Apple ID</button>
                </form>
                <form id="registerForm" class="auth-form">
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <button type="button" id="sendCodeBtn">Отправить код</button>
                    <input type="text" id="regCode" placeholder="Код из письма" style="display: none;">
                    <button type="submit" id="registerSubmitBtn" style="display: none;">Зарегистрироваться</button>
                </form>
            </div>
        </div>
        
        <div id="messengerScreen" style="display: none;">
            <div class="messenger-container">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <h3>Leksikon</h3>
                        <button id="closeSidebarBtn" class="icon-btn mobile-only">✕</button>
                    </div>
                    <div class="current-user">
                        <div class="avatar" id="currentUserAvatar"></div>
                        <div>
                            <span id="currentUsername"></span>
                            <span id="currentUserStars" style="font-size:12px; display:block;">⭐ 100</span>
                        </div>
                    </div>
                    <div class="search-box">
                        <input type="text" id="searchUsers" placeholder="🔍 Поиск людей...">
                        <div id="searchResults" style="margin-top: 8px;"></div>
                    </div>
                    <div class="users-list" id="usersList"></div>
                    <div class="groups-list" id="groupsList" style="margin-top: 10px;"></div>
                    <div class="sidebar-footer">
                        <button id="createGroupBtn" class="sidebar-btn">➕ Создать группу</button>
                        <button id="shopBtn" class="sidebar-btn">⭐ Магазин</button>
                        <button id="addAccountBtn" class="sidebar-btn">➕ Добавить аккаунт</button>
                        <button id="settingsBtn" class="sidebar-btn">⚙️ Настройки</button>
                    </div>
                </div>
                
                <div class="chat-area">
                    <div class="chat-header">
                        <button id="menuBtn" class="menu-btn mobile-only">☰</button>
                        <div class="chat-user-info">
                            <div class="avatar" id="chatAvatar"></div>
                            <div>
                                <span id="chatUsername"></span>
                                <span id="chatStatus"></span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button id="callBtn" class="call-btn" title="Аудиозвонок">📞</button>
                            <button id="videoCallBtn" class="call-btn" title="Видеозвонок">📹</button>
                        </div>
                    </div>
                    <div class="messages-area">
                        <div class="messages-list" id="messagesList"></div>
                    </div>
                    <div class="input-area">
                        <button id="stickerBtn" class="input-btn" title="Стикеры">😀</button>
                        <button id="photoBtn" class="input-btn" title="Фото">📷</button>
                        <button id="voiceBtn" class="input-btn" title="Голосовое">🎤</button>
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn">📤</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="settingsPanel" class="settings-panel">
            <div class="settings-content">
                <h2>Настройки</h2>
                <div class="settings-section">
                    <h3>🎨 Тема</h3>
                    <select id="themeSelect">
                        <option value="purple">Фиолетовая</option>
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                        <option value="amoled">AMOLED</option>
                    </select>
                </div>
                <div class="settings-section">
                    <h3>📏 Размер текста: <span id="fontSizeValue">16</span>px</h3>
                    <input type="range" id="fontSizeSlider" min="12" max="24" value="16">
                </div>
                <div class="settings-section">
                    <h3>🔄 Скругление углов: <span id="borderRadiusValue">18</span>px</h3>
                    <input type="range" id="borderRadiusSlider" min="4" max="32" value="18">
                </div>
                <div class="settings-section">
                    <h3>🖼️ Аватарка</h3>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <img id="profileAvatar" class="avatar" style="width: 60px; height: 60px;">
                        <input type="file" id="avatarInput" accept="image/*">
                    </div>
                    <button id="uploadAvatarBtn">Загрузить</button>
                </div>
                <div class="settings-section">
                    <h3>👤 Профиль</h3>
                    <input type="text" id="profileUsername" placeholder="Username (англ.)">
                    <textarea id="profileBio" placeholder="О себе" rows="2"></textarea>
                    <input type="date" id="profileBirthDate">
                    <button id="updateProfileBtn">Сохранить</button>
                </div>
                <div class="settings-section">
                    <h3>🔐 Безопасность</h3>
                    <button id="showSetPasswordBtn">Установить пароль</button>
                    <div id="setPasswordDiv" style="display: none; margin-top: 10px;">
                        <input type="password" id="newPassword" placeholder="Новый пароль">
                        <button id="confirmPasswordBtn">Сохранить пароль</button>
                    </div>
                </div>
                <div class="settings-section">
                    <h3>👁️ Конфиденциальность</h3>
                    <select id="privacyEmailVisible">
                        <option value="everyone">Кто видит email: Все</option>
                        <option value="contacts">Кто видит email: Контакты</option>
                        <option value="nobody">Кто видит email: Никто</option>
                    </select>
                </div>
                <div class="settings-section">
                    <h3>⭐ Баланс</h3>
                    <div>У вас <span id="starsBalance">0</span> звезд</div>
                    <button id="buyStarsBtn">Купить звезды</button>
                </div>
                <div class="settings-section">
                    <h3>📱 Устройство</h3>
                    <div id="deviceInfo" style="font-size: 14px;"></div>
                </div>
                <button id="closeSettingsBtn" class="close-btn">Закрыть</button>
            </div>
        </div>
        
        <div id="callModal" class="call-modal" style="display: none;">
            <div class="call-modal-content">
                <div id="callerName"></div>
                <div id="callStatus">Звонок...</div>
                <video id="localVideo" autoplay muted style="width: 100%; border-radius: 12px;"></video>
                <video id="remoteVideo" autoplay style="width: 100%; border-radius: 12px;"></video>
                <button id="hangupBtn" style="background: red;">Завершить</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
